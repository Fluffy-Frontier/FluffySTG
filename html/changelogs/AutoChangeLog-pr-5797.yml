author: "HecoWolff"
delete-after: True
changes:
  - map: "Теперь Интердайну не так страшны атаки Колосса, стены купола имеют полный иммунитет к его кольям. Окна все так же могут быть разрушены."
  - map: "У Интердайна наконец-то вместо затычки по энергии в виде ДЕБАГ СМЕСа появился реактор на 650 кв."
  - map: "На базе Интердайна теперь есть спавнер боргов Интердайна."
  - map: "Добавлена система оповещений, теперь сотрудники Интердайна получают уведомление, когда кто-то просыпается из капсулы Интердайна."
  - map: "Окна в ванную интердайна убраны, бинокль и коробка с салфетками для подглядывания были убраны от дормиториев Интердайна."
  - map: "Добавлен бинокль в карго интердайна"
  - map: "В атмос интердайна добавлены канистра азота и канистра воздуха"
  - map: "Канистра БЗ интердайна перенесена в атмос интердайна"