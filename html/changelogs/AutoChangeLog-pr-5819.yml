author: "HecoWolff"
delete-after: True
changes:
  - bugfix: "Пофикшены доступы у заключенного ДС-2, теперь он не обладает доступами от всего судна."
  - bugfix: "Хирургические наборы у Интердайна были заменены на немного другие (вместительные), так же из него был убран багованый дефибриллятор Интердайна и ненужная пила. (теперь инструменты можно положить обратно в коробку)"
  - bugfix: "Пофикшен доступ у кнопки на ДС-2, а так у шлюза в инженерном отсеке (турбина)."
  - rscadd: "ДС-2 добавлена система автоматических оповещений (как на интердайне), теперь сотрудники ДС-2 будут знать, если кто-то проснулся из сна."
  - rscadd: "В медицинский и научный отдел ДС-2 были добавлены соответствующие вендоры с одеждой."
  - rscadd: "В бриге ДС-2 добавлено несколько окон для лучшего обзора на заключенных."