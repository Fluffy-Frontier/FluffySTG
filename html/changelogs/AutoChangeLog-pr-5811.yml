author: "HecoWolff"
delete-after: True
changes:
  - rscadd: "В автомат с одеждой Интердайна был добавлен фирменный бомбер."
  - rscadd: "В автомат с одеждой Интердайна были добавлены Фронтир сумки."
  - rscadd: "В автомат с одеждой Интердайна были добавлены Баллистические очки."
  - rscadd: "В автомат с одеждой Интердайна было добавлено два фирменных кейса для оружия."
  - map: "В медицинском отделении Интердайна добавлены фирменные хирургические наборы (старый дюффель остался на случай, если им пользоваться привычнее)."
  - map: "В медицинском отделении добавлен еще один дефибриллятор для второго хирургического стола и второй хирургический набор."
  - map: "В техническом помещении Интердайна заменен неверный тайл O2 на N2."
  - map: "В техническом помещении Интердайна все подозрительные ящики изменены на фирменные и Киберсана во имя поддержания конспирации."
  - map: "В техническом помещении Интердайна добавлен ящик с фирменной медициной Интердайна (аналоги получше покупаются только в консоли заказов интердайна)."
  - map: "В техническом помещении Интердайна показатели инжекторов были увеличены до 200 (просили)."
  - map: "В хранилище Интердайна была добавлена плата POWERATOR (interdyne edition)."
  - map: "Складной фабрикатор Интердайна был перенесен в хранилище Интердайна."
  - map: "Интердайну в версии карты АЙС БОКС был добавлен гараж под снегоходы (находится там, где должен быть шаттл, в гараже присутствует необходимая экипировка, канистра для кислорода и сами снегоходы. Ворота находятся под общим ИД, что означает их ремонтопригодность, доступность: СИНДИКАТ.)."
  - map: "Грузовой контейнер у Интердайна в версии карты АЙС БОКС был переставлен на другую сторону."
  - map: "Все постеры в куполе Интердайна намекающие на синдикат были изменены на нейтральные."
  - map: "Все мониторы в куполе Интердайна больше не должны показывать логотип Синдиката."
  - map: "Внутри купола Интердайна было добавлено пару лампочек."