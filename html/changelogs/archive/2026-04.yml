  Hatterhat:
  - image: Resprited the advanced energy gun. Credits to Zydras for the original e-gun
      sprite, and /vg/station for their variant of the advanced energy gun, which
      the new sprite takes some design notes from.
  - bugfix: Antique laser guns (e.g. the captain's laser gun) now have their intended
      charge delay of 8 ticks, down from 15.
  - balance: Advanced energy guns now have a charge delay of 5 ticks, down from 15,
      and recharge 3 shots per cycle (15% of the cell) up from 1 shot per cycle (5%
      of the cell).
  - rscadd: Following the short-lived success of the KOLBEN/NACHTREIHER overhaul suite
      for M64 shotguns in Nanotrasen/FTU markets, Archon Combat Systems has begun
      rollout of the LAMMERGEIER overhaul suite for double-barrel shotguns, featuring
      duplex barrel chargers and an over/under configuration for precision fire. The
      Lammergeier has a passive 70% multiplier on projectile spread, with the barrel
      charger system taking it to a 40% multiplier on spread.
  - balance: Downtuned the spread reduction on the amped Nachtreiher from a 40% multiplier
      to a 70% multiplier.
  - balance: Spawner-made legion and snow legion now drop charred corpses again, instead
      of summoning another skull to get attacked by.
  - balance: Ashwalker rituals that formerly required human corpses, then legion cores,
      now require legion tumors, which can be pilfered from legion corpses.
  - rscadd: .980 Tydhouer kinetic concussive grenades are now able to be printed from
      niche lethal ammo disks, or buyable as boxes from Cargo's goodies.
  - rscadd: The Syndicate has begun to issue newly-received "Covenant" e-sword variants.
      While, essentially, statistically identical to their conventional energy swords,
      some argue that they strike a more imposing image. You can recolor them with
      a multitool, but they can't go rainbow mode.
  - balance: Following some complaints and suggestions, Nanotrasen's weapon development
      teams revisited the NT/E Laevateinn upgrade suite and improved both its cylinder
      and coolant systems, resulting in a larger capacity and increased firerate when
      amped, respectively.
  - balance: To facilitate the Laevateinn's upgraded capacity, the Laevateinn kit
      in Cargo now includes a DIY speedloader upgrading kit.
  - balance: Citing a sudden decrease in unattended protolathes, the Syndicate's Marauder
      Program has started recycling recovered voltaic combat cyberhearts from dead
      scientists, resulting in a reduced quality of usable anomaly-powered cybernetic
      hearts, with increased cooldown cycle time (10 minutes, up from 5), decreased
      active time (10 seconds, down from 30) and a lack of passive electromagnetic
      shielding.
  - balance: Space Phase now has a cooldown of 30 seconds, up from 0, that applies
      when you exit Space Phase.
  - balance: Space Phase no longer grants space immunity and only allows traversal
      on space or low-pressure outdoors turfs.
  - balance: Ashen Passage cooldown doubled to 30 seconds, up from 15.
  - balance: Feast of Owls is no longer a roundstart knowledge.
  - balance: Nanotrasen has upgraded their expeditionary deathrattle licenses for
      the sector, allowing them to alert to deaths anywhere BUT the station, making
      them actually useful for aspiring space explorers and/or people who are paranoid
      about being hucked out of airlocks.
  - rscadd: Realizing that they can, in fact, just do things, Nanotrasen has started
      using some of their gathered data on anomalies in order to progress military
      technology in the form of anomaly-based throwable munitions, with their first
      foray being bluespace grounders, crafted with a case of uncharged anomaly grenades
      (from Cargo) and a dimensional anomaly core (from Science). Grounders only work
      within a 2-tile range, at most.
  - balance: The SolFed Halo rifles now have regular damage multipliers (1x damage
      for the assault rifle, 1.1x damage for the battle rifle/DMR).
  - bugfix: HC's tiny melee stungun no longer duct tapes its lore to the NT stunbaton's
      lore.
  - spellcheck: Lore for the NT baton and contractor baton were tweaked for slightly
      more lore compliance.
  - rscadd: Realizing that they can, in fact, do things, Nanotrasen has licensed Robust
      Corp's bluespace grounding technology for use in retooled MOD emergency tether
      modules. These can be found as MOD grounded apprehension modules, under Security
      Modular Suits.
  - rscadd: Nanotrasen has begun rolling out (unconfigured) expeditionary deathrattle
      implant kits for their mining teams for 900 points (585 points, if manually
      delivered). These only alert for deaths on raw mining wasteland, and will not
      work in space, ruins, or on-station.
  - balance: Kheiral cuffs can now be attached to uniforms as accessories. They retain
      their suit sensor extension/GPS functionality (still only when off station Z-levels,
      though).
  - bugfix: Beacon implants now turn off (hide themselves on prisoner management consoles)
      after ten minutes, matching the tracking implant's functionality.
  - qol: Made the implant pad UI a little nicer to look at, with dropdowns and demarcated
      sections.
  - code_imp: Implants now have separated "immediately useful" information and "extended
      lore tidbits" information as variables instead of one unchangeable get_info()
      block.
