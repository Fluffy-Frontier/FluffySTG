      another mob, it won't ghost you or kick you out upon transformation.
  - sound: wands and staffs adjust their fire sound pitch instead of frequency as
      charges are depleted
  - bugfix: Killing yourself with a Gullion fish in an oxygenated environment will
      correctly turn you into a statue
  - bugfix: Killing yourself with a Gullion fish will kill you rather than leaving
      you as a living statue that can't do anything and forcing you to Ghost manually
  - bugfix: When you spawn as a plasmaman ninja, you will also have some breathable
      air in your pocket
  - qol: When you spawn as a ghost role plasmaman your internals should be enabled
  - balance: Eldritch rusted tiles don't apply their effects to anyone who is jaunted
      or in vents, and don't apply negative effects to people who are flying.
  - balance: Heretic items which apply rust (grenades and eldritch reagent) check
      the rust resistance level of the turf rather than always rusting it.
  - bugfix: Rust Heretics ascending don't rust unrustable turfs, like space tiles.
  - balance: Nightmares are Light Drinkers in addition to being Light Eaters.
  - bugfix: Pizza slices now contain a proportional amount of whatever the pizza contained,
      so sliced poisoned pizza will still be poisonous and sliced robo pizza will
      still turn people into robots.
  - bugfix: Removed a bugged pizza from the pizza ruin and replaced it with a margherita
      pizza.
  - bugfix: Bugged pizza no longer looks identical to functional margherita pizza;
      it's a big error graphic.
  - balance: Support Guardians cannot heal their owner while recalled.
  - balance: Dextrous Guardians cannot use their hands while recalled.
  - bugfix: Gaseous Guardian particles will correctly dismiss when you recall.
  - bugfix: Guardian health hud will display the correct value when you are first
      summoned.
  - rscadd: Escaped bitrunning glitches will visually distort when interacted with
  - bugfix: Escaped bitrunning glitches will not stick around as holographic corpses
      after they die
  - rscadd: You can now also load stunprods into ballistas, make sure you turn them
      on first though
  - balance: The mounted ballista's damage, wound chance, and armour penetration is
      now dependent on what kind of spear is loaded into it, and is generally a bit
      lower
  - balance: Mounted guns are less accurate when not wrenched down
  - bugfix: Cancelling reloading a ballista now cancels the reload rather than completing
      it.
  - bugfix: You can pick up the exact same spear you fired out of a ballista, rather
      than a totally new generic spear
  - bugfix: It is possible to damage and destroy mounted guns with weapons
  - code_imp: Reworked mounted guns to duplicate less code, please report any deviant
      behaviour
  - rscadd: If you kill yourself with a spear you will impale your head on that spear.
  - bugfix: Chainsaws can't behead people with unremovable heads.
  - bugfix: You can only put your own head on a spear or into a box if it is possible
      to remove your head.
  - bugfix: Heretic rifts can only remove your arms if your arms can be removed.
  - bugfix: Paperwork can only cut off your head if your head can be cut off.
  - bugfix: Smite being reflected can only blow off your arm if your arm can be removed.
  - bugfix: AI shell deployment verb no longer requires you to select yourself from
      a list first
  - bugfix: Meat toilets will now contain all of the belongings they were wearing
      prior to transformation, which can be retrieved if the cistern is open and the
      lid is closed.
  - bugfix: Plasmaman Nuclear Operative helmet does not turn into a big error graphic
      when its torch is enabled
  - image: Plasmamen Nuclear Operatives illuminate their skull with red light instead
      of purple
  - rscdel: It's no longer considered quirky to have Big Hands.
  - bugfix: Killing yourself via starfish no longer causes a runtime error when you
      float onto another Z level
  - bugfix: Killing yourself via starfish now unequips your pants before turning you
      into an astral being
