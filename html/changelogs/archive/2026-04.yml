  - balance: Echolocaters can filter out certain objects that they would really prefer
      not to see at the moment.
  - balance: Echolocaters are mechanically (but not visually) blind, which means they
      have flash immunity and whatnot. Because of course they are.
  - balance: Echolocater lose their ability to echolocate if they've gone deaf. Then
      you're truly fully blind.
  - balance: Echolocaters can see (or rather, hear) mobs through walls.
  - refactor: Refactored Prosopagnosia to make the effect a bit more generic.
  - qol: Stack items have a number indicating stack size while held or in inventory.
  - qol: Paper UI now updates immediately when you pick up or drop a writing tool.
  - qol: The roundstart command report has had its style updated, and now contains
      some bonus lore.
  - admin: Changes the perms needed to add command report footnotes to "Fun" rather
      than "Admin"
  - admin: Adds a verb for changing the command report main contents (Requiring "Fun")
  - config: Adds a config for hiding the dynamic report, disabled by default (disabled
      meaning you still get the report)
  - balance: When you are shocked, you remain standing for a short period of time
      before being forced to the ground. You are still stunned for the duration of
      this effect, that remains unchanged.
  - rscdel: Wardens no longer spawn with an evidence bag
  - balance: Inexorable's crit damage is halted in hard crit while you have Epinephrine
      or similar, so you can actually get healed out of hard crit
  - balance: Atropine stops crit damage like Epinephrine
  - bugfix: Fixed spotlight effect on multi-z map
  - bugfix: Fixes Changlings transformed into a Felinid losing decap immunity thanks
      to their newly shrunken brain
  - balance: Golems have a whopping 0.5x modifier to brute and burn damage, but no
      longer have a 0.9 modifier to tox / oxy damage.
  - balance: Golems have a new 0.6x modifier to stamina damage and stun duration,
      but also a new 1.2x modifier to knockdown duration.
  - balance: Golems can no longer be defibrillated. Revival surgery is... untouched,
      I guess.
  - balance: Golems can be revived by applying materials to their body. Each sheet
      restores some brute and burn damage, as well as some nutrition. When sufficient
      brute, burn, and nutrition are restored, they are revived!
  - balance: Golems can no longer fall into soft crit. They can still enter hard crit
      and die when taking sufficient damage, though.
  - balance: When a golem is attacked with brute or burn damage, they sustain direct
      nutrition drain based on how much damage dealt.
  - balance: Golems drain nutrition faster if near starving or below the normal soft
      crit threshold.
  - balance: Golems fall unconscious if starving.
  - balance: When a golem's nutrition hits 0, they die!
  - balance: Golems cannot get overweight, but are capped on the amount of nutrition
      they can have
  - balance: The strength of titanium's reduction to brute damage when consumed by
      a golem or rock eater has been reduced (0.7x -> 0.8x)
  - balance: Eating iron no longer heals tox or oxy for golems or rock eaters (still
      heals brute and burn)
  - balance: Golems now have a unique bodytype, making them ineligible for some surgeries
  - balance: Pressure damage scales over time. It starts at 2 per second (pre-buff
      value) but increases by 0.5 damage every 1.2 minutes you are exposed, up to
      5 per second (requiring 7.2 full minutes of exposure).
  - rscadd: Wardens can alt-click-reskin their Kaza Ruk gloves to match their formal
      attire
  - bugfix: Moth wing repair surgery correctly checks that bones are intact rather
      than bones are sawed
  - qol: Operating computers, Vitals readers, and the health analyzer MODsuit module
      (when active) can be used in the place of a health analyzer to display precise
      health stats during a Tend Wounds surgery
  - rscdel: Admins can no longer use the NAP button
  - balance: 'Thermal vision mutation: Active duration 10s -> 30s  (with power, 30s->45s)'
  - balance: 'Thermal vision mutation: Cooldown 25s -> 60s (with energy, 60s -> 30s)'
  - balance: 'Thermal vision mutation: Eye damage 10 -> 7.5 (with sync, 7.5 -> 3.75)'
  - balance: 'Thermal vision mutation: Eye damage is now affected by power chromosome
      (with power, 7.5 -> 11.25)'
  - rscadd: When you get absorbed by a changeling, you get made into an imaginary
      friend of the changeling that absorbed you.
  - refactor: Refactored how people are returned to their bodies after occupying separate
      bodies, such as bitrunners and ghost roles. Report any oddities or failure to
      return correctly.
  - rscadd: Adds "surgical processor implant", a cybernetic brain implant which grants
      the user knowledge of whatever surgeries are installed in it.
  - rscadd: Cerdits siphoned from the vault are output as space cash rather than as
      holochips
  - bugfix: Fix hand surgery (stomach pump, etc) being blocked by the patient being
      on combat mode rather than the surgeon
  - refactor: Refactored item reskinning (the alt-click way), report any oddities
      with that
  - rscdel: Deleted the crusher retool kit, now you can just reskin your crusher with
      alt-click. The Skull skin is still locked behind having the Ashen Skull trophy
      applied.
  - bugfix: Stunswords no longer have an incorrect lore blurb
  - bugfix: Fixed loadout item reskinning's UI
  - rscdel: Eigenstasium can no longer create Eigenlockers
  - rscadd: Rarely, maintenance lockers will spawn as Eigenlockers, potentially linked
      to any other locker on the station - yes, even the Captain's.
  - rscadd: Teleporting via an Eigenlocker doesn't auto-open the destination locker,
      allowing you to hide in them.
  - qol: You are always notified if your paycheck amount changes
  - rscadd: A bullet to the brain has a rare chance of providing a free lobotomy
  - rscadd: Adds "reset dislocation" operation, which is a surgical analog to resetting
      a dislocated limb. Same tools, same steps, but if you go through the effort
      of doing it surgically, it's faster and safer.
  - rscadd: All wound surgeries now gain a speed bonus from being wound scanned.
  - spellcheck: Corrects the blind message for manual cauterization
  - balance: Rebalanced Unstable Mutagen's / Uranium's botany use. It now always increases
      instability (on par with L4Z), and occasionally increases instability even more
      at the costs of some toxins. It also scales with volume
  - rscadd: Adds "Toxin Resistance" gene to botany which makes the plant immune to
      toxin damage. Given (and graftable from) Death Berries.
  - rscadd: Adds "Toxin Adaptation" gene to botany which makes the plant heal from
      toxin damage. Only in strange seeds (for now).
  - code_imp: Cleaned up a smidge of botany code
  - bugfix: Syncing instruments no longer fails if starting instrument is held
  - qol: Dna console has a minor visual indicator for invalid pairs (such as A-A or
      C-T)
  - balance: When the Paddy enables its sirens, it also enables overclock mode, speeding
      it up 1.5x.
  - balance: Paddy is forced onto overclock safety mode, meaning said overclock will
      self-disable eventually.
  - balance: Plant instability can no longer cause the value of the instability stat
      to change randomly unless instability is >=80
  - balance: Plants can no longer mutate their stats twice in one tick starting at
      40 instability - though the degree to which stats mutate is still increased
      at the 40 mark, that is unchanged.
  - balance: Plasmamen no longer take flat 1.5x brute and burn damage
  - balance: Plasmamen are now affected by weapon demolition modifier, meaning blunt
      attacks deal more damage but slashing or piercing deal less damage
  - balance: Skeletons and Golems are also affected by weapon demolition modifier,
      as well as any mineral type mobs (of which none currently exist)
  - rscadd: Adds stasis bodybags, unlocked with cryo tech. They put its occupants
      (organ or mobs) in stasis, but wear down over time.
  - rscadd: Adds triage cards to the medical vendor, a flavor item docs can use during
      mass casualty events.
  - qol: You can pin papers to closed bodybags. Keep organized with your autopsies.
  - qol: You can interact with papers in folders and on clipboards
  - qol: All forms of stasis stop brain tumors
  - bugfix: Fix Asclepius screen alert when the holder has a lantern
  - bugfix: You can't click the Asclepius screen alert
  - rscadd: Adds Tourniquets. While attached to a limb, reduces blood loss from that
      limb by 90%, but makes you walk / interact slower. (Or if you put it on your
      head, you die.)
  - rscadd: You can purchase Tourniquets from the premium section of the medical vendor
  - rscadd: 'Paramedic belt setup has changed yet again: Surgical tape replaced with
      Tourniquet, Bone gel replaced with Bonesetter.'
  - rscadd: You can use all forms of tape as splint - like Gauze. Will secure a fracture
      but won't stop your blood from exiting.
  - refactor: Refactored gauze entirely, report any strangeness with it (or tape,
      or tourniquets)
  - rscadd: Desensitization to death is no longer binary - some antagonists are now
      more used to it than others.
  - rscadd: Witnessing the death of a fellow humanoid (or dying yourself) will slightly
      desensitize you to future deaths.
  - rscadd: Adds an achievement for managing to max out desensitization across a round.
  - rscadd: Desensitized crewmembers care less when splattered with blood.
  - rscadd: Holodeck mobs have a reduced death mood impact.
  - qol: Chameleon ID's selection pool has been trimmed down, removing all the weird
      random IDs and trims like "Head Occultist", to make it easier to find the real
      job trims. You can (of course) manually forge the ID to set whatever job text
      you want.
  - qol: Chameleon items format their name slightly differently, making it easier
      to search
  - rscadd: You can now find the SDMS-35 in Medbay, the CMO's office, the Psychologist's
      office, and possibly the Library. Quite simply, it's a reference book for all
      the brain trauma's you may experience.
  - qol: Blushing matches blood color, so lizards blush greeeen.
  - refactor: Refactored how deafness is tracked. Please report any weird interactions
      with sounds, like messages or sfx being missing.
  - bugfix: Lacking ears and being in hard crit now consistently treats you as "being
      deaf". This affects a few minor interactions like empath, the jukebox, and sleeping.
  - qol: Secure prosthetic surgical operation ignores clothing
  - rscadd: Surgery has been REWORKED ENTIRELY
  - rscadd: Surgery is now STATE BASED. What does this mean? Well, when you start
      surgery, you apply drapes and then make an incision. Then you can either retract
      skin or clamp bleeders. Once you retract skin you gain access to outer cavity
      operations, then once you saw the bones, inner cavity operations.
  - balance: If your vessels are unclamped, you bleed pretty fast. Clamp those blood
      vessels fast to stop blood loss in surgery.
  - balance: Species which lack skin or bones allow you to skip surgical steps. Skeletons
      have no skin to incise, after all.
  - qol: Nectrotic Revival now works with chemicals in the syringe used, rather than
      only chemicals in the patient.
  - qol: You can close a surgery with sutures, rather than only a cautery.
  - qol: You can no longer feed someone an organ who is undergoing an operation.
  - rscadd: Many surgeries have received new names or flavor.
  - rscadd: The operating computer has received major tweaks. It now shows all potential
      operations and the patient's current surgical state, highlighting any steps
      you could take next.
  - rscadd: New surgeries are now available immediately upon research. Syncing is
      dead.
  - rscadd: Organ fishing can now be complete in someone with an open cavity, rather
      than someone undergoing organ manipulation.
  - balance: You can no longer fish a vital organ (the brain) out of someone.
  - rscadd: Organ thrower mod now works on people with open cavities, rather than
      people undergoing organ manipulation.
  - rscadd: Chestbursters now no longer gib people with open cavities, rather than
      people undergoing organ manipulation.
  - rscadd: Xenomorphs now have CHITIN rather than FLESH. This means little besides
      indicating you need a saw to incise their skin.
  - rscadd: Sterilizine and similar chemicals now have a set duration, 1 minute per
      unit applied, up to 5 minutes.
  - rscadd: Medibot upgrades are now applied automatically on research. Syncing is
      dead.
  - rscadd: Many mechanical surgeries targeting organs now require cybernetic organs
      rather than a cybernetic bodypart.
  - refactor: Surgery has literally be rewritten from the ground up. If you see anything
      broken or weird looking, particularly with mechanical surgeries and medical
      cyborgs, please report it
  - qol: Examining yourself for injuries explains how to apply pressure to bleeding
      limbs
  - qol: If a surgery table has a patient on it, and you click it with a surgical
      tool, it redirects the click to the patient instead of placing the tool on the
      table
  - bugfix: Fix wallet (again)
  - bugfix: Having an active honorific no longer changes your runechat emote color
  - rscdel: N-spect scanners can no longer print reports. All it does now is scan
      for contraband.
  - rscdel: Clown N-spect scanners have been removed.
  - rscdel: Security no longer get bounties to loot the brig's equipment. Though the
      contraband bounty is still available.
  - rscadd: Security's patrol bounties have been reworked. Now, they just require
      you to walk around an area for a bit. No scanning necessary.
  - refactor: Adds setters for bounties and bank accounts. Report any situations where
      your bank account is not set correctly.
  - refactor: ID trims now handle bounty generation. Report any situations where you
      get a weird pool of bounties.
  - bugfix: Bountious Bounties station trait works again
  - rscadd: You can skip the "apply drapes" step of surgery if the patient is buckled
      to an operating table or stasis bed!
  - balance: Stasis now stops addiction ticks while active - meaning addictions will
      not apply their ticking withdrawal effects, but also won't heal over time
  - refactor: Rewrites how addiction points are applied from reagents. Some reagents
      may be marginally more or less addictive as a consequence.
  - balance: Addiction gained per metabolism tick now scales to the amount of reagents
      metabolized. In other words if you metabolize 0.2 units instead of the expected
      0.4 units, you get 0.5x of the amount of addiction gain. This ultimately changes
      very little and I would imagine it's how most people expected it to work in
      the first place...
  - bugfix: Naive and Desensitized people get less sad at death
  - rscadd: Adds screen hud elements for ghost toggles
  - qol: Objects that can pass over tables don't block table construction
  - qol: If table construction fails, it tells you what is blocking, rather than "something
      is"
  - balance: Chem factory Bottlers, Presses, and IV drips are now limited to holding
      3 distinct chemicals at once, meaning they can make patches/pills/bottles/etc.
      of at most 3 different types of chems. Manually created pills/patches/etc are
      unaffected.
  - balance: ' Chem factory Smoke Machines and Output Gates are now limited to holding
      5 distinct chemicals at once, meaning they can accept at most 5 different types
      of chems from a chem factory. Manually filling the smoke machine is unaffected.'
  - rscadd: Scientists only say Balmer voicelines if they are whimsical
  - rscadd: Surgery gets slower if the surgeon is drunk, UNLESS you land in the Balmer
      Peak, then it's actually faster.
  - refactor: Refactored death moodlet, report any oddities
  - qol: If an airlock pump's link is broken, it unbolts all airlocks
  - rscadd: Adds vitals monitors, mapped into the medbay treatment center, cryogenics,
      and every surgical theatre. They act as wall mounted health scanners, providing
      visual feedback for a patient's health.
  - rscadd: Adds doppler radar towers to Lavaland and the Icemoon. These towers ensure
      weather radios have accurate readings.
  - rscadd: Adding a weather anomaly core to a radar tower upgrades it, giving you
      control of weather - allowing you to cancel storms or even spawn a weather event
      of your choice. However, the core will expire after use, requiring replacement.
  - rscadd: You can construct radar towers with plasteel. Even on the station. Yes,
      you can summon weather onto the station.
  - balance: Limits weather anomaly cores to 5.
  - bugfix: Fix alt stunsword skin
  - qol: Biogenerators protect food placed on top of them from germs
  - rscdel: Cytology creations no longer have a random chance to fail if another sample
      in the vat has growth process. All growth is still reset on any successful creation.
      As growth failure has been removed, some cell lines that had unique fail interactions
      have been altered.
  - rscadd: Clown cell lines are now all boosted by supplying mutagen. However, using
      mutagen may cause a mutant clown to spawn. (Before, failure caused a mutant
      clown to spawn.)
  - rscadd: Queen bee lines now alternate between spawning a queen bee and a swarm
      of bees. (Before, failure caused a swarm of bees to spawn.)
  - rscadd: Cytology created bees have a rare chance of having a random toxin.
  - balance: Eigenstasium teleportation now has a precision of 3, up from 0 - meaning
      the teleport now picks a random tile up to 3 tiles away from the creation spot
  - balance: If Eigenstasium return teleportation fails - due to stabillizing agent
      - it leaves an echo behind. The echo lasts for 5 minutes, but is reduced the
      longer the Eigenstasium metabolized in your body.
  - rscadd: Hangover effects depend on personality traits
