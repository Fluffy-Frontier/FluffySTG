  se:
  - balance: Killing yourself with a tadpole now only bursts your chest open and not
      your entire body, and frankly even that is pretty impressive work for a single
      frog to manage.
  - bugfix: Killing yourself in various other ways that gib or dust you will no longer
      delete the items you were wearing, consistent with most of the other ways of
      killing yourself that gib or dust you.
  sergeirocks100:
  - qol: Holographic pay stands no longer dissipate if the ID used to make them gets
      more than 4 tiles away.
  - rscadd: You can now print dice in the autolathe.
  - rscadd: You can now craft dice bags, with 2 sheets of leather.
  sesametg:
  - server: 'fix: HR have reopened positions at unstaffed stations'
  splat1125:
  - rscadd: '[Thanks to Rett Jester] Three new vocal barks based around extremely
      old vocal synthesizers!'
  - bugfix: Chunky Twin Buns is now actually in the list of pickable hairstyles
  - bugfix: '''Zero'' and Chunky Ponytails are no longer awkwardly clipped by berets'
  - rscadd: Added a new undershirt, the cropped corset. recolorable!
  - rscadd: Added a new under/uniform clothing item, wide legged pants, to loadouts
      and station vendors. recolorable!
  - bugfix: Security battle dress is no longer missing a single pixel at the crotch
      when worn with the female bodytype
  - rscadd: 'Added five new hairstyles: "Chunky Twin Buns", "Chunky Quad Buns" (c:
      carpotoxin), "Chunky Ponytail", "''Zero'' Ponytail", and "Misshapen"'
  - image: Fixed outdated Teshari bio suit sprites for all variants
  - image: Added Teshari sprites for all bio hood variants
  sqnztb:
  - bugfix: Soda dispensers now get their T2 upgrades applied properly. Apple, pumpkin,
      and vanilla return.
  - bugfix: FOCK tool now only works on airlock subtypes.
  - rscadd: Interdyne's lavaland shuttle now is much more protected against NT's Shaft
      Miner Rudeness
  - rscdel: blank mentoring books no longer give language experience. read some books,
      or get the curator to write you a book if you want to learn a new language
  - balance: HC survival packs are now normal sized.
  - map: swapped DS2's maintenance loot spawners to other, non maint loot spawners.
  - bugfix: visitor quirk no longer removes all assistant records.
  - balance: Atmos export prices greatly reduced across the board. See PR 6796 for
      new values.
  - rscadd: UDCs and gear harnesses have been added to the ClothesMate vending machines.
  timothymtorres:
  - rscadd: 'Add crafting recipes for: lamps, lanterns, strange closets, cabinets,
      and metal boxes.'
  - rscadd: Add autolathe recipe for flares. (plastic, plasma, and iron)
  - rscadd: Add washer machine board to Sanitation techweb. The beaker volume affects
      the total amount of items that can be washed and the servo tier affects how
      long the washing takes.
  - rscadd: Add wooden crafting recipes for gavel hammer and gavel blocks. (aka the
      judge's hammer in the courtroom)
  tontyGH:
  - bugfix: As the AI, possessing an empty shell will no longer break your de-synchronization
      protocols, which would trap your Nanotrasen-brand Silica-Soul(TM) inside of
      it.
  - bugfix: Viruses that heal their hosts through radiation no longer cause phantom
      pain.
  trickyfox-inc:
  - admin: New adminverb "show occupants PP". You can now open the PP of mobs inside
      vehicles, closets, machinery, body bags, etc. via the RMB context menu.
  vinylspiders:
  - code_imp: item spawning menu should be somewhat faster now
  - refactor: extended atom_skins to be more customizable. Please report any bugs
      to github.
  - bugfix: fixes a bug where the quirk menu does not update when adding/removing
      quirks
  - bugfix: fixes some fontawesome ui icons displaying as unicode literals instead
      of the actual icons
  - bugfix: nearsightedness and other quirk prefs that use iconned dropdowns will
      no longer be cut off
  - bugfix: fixes a pushed crate not removing on_climbable trait properly off the
      mob standing atop it
  - refactor: refactors table_smash component into an element
  - bugfix: fixes an issue where vox could select the nitrogen breather quirk, and
      plasmamen could select the plasma_breather quirk despite that being their default.
  - bugfix: fixes slimepeople being able to select the plasma_breather quirk, this
      was not intended for balance reasons but the code to prevent them from selecting
      it had a bug.
  - bugfix: fixes certain particle effects not triggering under certain conditions
  - bugfix: the interactions panel 'info' section (pleasure, pain, etc) will only
      display if you have erp interactions available
  - bugfix: naga constrict no longer creates a coiled tail when clicking non living
      things.
  - bugfix: larger taur body type emissives will no longer float away from the mob
  - bugfix: latejoin tracker should no longer update as the round is starting to reflect
      roundstart rulesets
  - bugfix: switching characters in the prefs menu should be less laggy now
  - code_imp: sinks can be mounted to floors
  - bugfix: fixes the sql schema revision being wrong in the code
  - refactor: crafting menu should be slightly faster now with searching the area
      for items that are blacklisted, and uses less memory than it did previously
  - refactor: faction list structures have been refactored, please report any unusual
      faction related behavior
  - refactor: refactors mutant bodyparts backend
  - bugfix: bodypart markings and marking sets will now inherit the appropriate mutant
      colors when initially applied in char prefs
  - bugfix: fixed a bug where choosing 'None' as your ear type using the polymorph
      nif or alter form would just make you deaf
  - refactor: simple rotation component has been refactored into an element Please
      report any bugs to github.
  - bugfix: fixes tablesmashing onto platforms
  - bugfix: ammo counter HUDs will now prioritize your active hand, and will no longer
      not update when reaching 100% charge for energy weapons
  - qol: 'ammo counter HUDs are now available for drones

      /:cl'
  - server: updates bun version to 1.3.5, and adds automated validation for tgs
  - bugfix: fixes an exploit where you could use pixel tilt to infinitely scale your
      character up or down
  - bugfix: fixes some escape menu urls pointing to tgstation defaults
  - bugfix: fixes a bug where using dermagen to erase scars would also erase your
      identity and make you unexaminable
  - bugfix: fixed tilting not working with shift/ctrl + bindings.
  - qol: tilting is now a toggle, to exit tilting just press the hotkey again or move
      up or down. adds feedback in the form of a balloon alert.
  - bugfix: fixes cryopod console buttons getting cut off from long item names
