  Iamgoofball:
  - qol: Restores keybindings to their original pre-August 2025 defaults, moves the
      new per-hand bind options to Unbound by default.
  Jacquerel:
  - rscadd: Adds 16 more wizard wands to the game, which wizards can buy cheaply but
      randomly, or are available via Summon Magic.
  - rscadd: If a wizard buys more than one set of wands they will receive a "Wand
      Bandolier" holster which fits in the backpack or, if worn in the suit slot,
      will automatically exchange an expended wand for a full one.
  - balance: Staffs (and wands) of animation that are animated will try to animate
      other objects instead of firing at living mobs, which are already animated.
  - balance: Animating a wand of nothing will turn it into a wand of animation (and
      animate it).
  - balance: The staff of chaos can now do more things.
  - balance: Magicarp now additionally come in Babbling, Frigid, Quantum, and Weightless
      varieties. Collect them all!
  JohnFulpWillard:
  - rscdel: Deleted Object tab, and Server tab for players. Activate Held Object verb
      is now in the IC tab. Examine and Point To was removed from the stat panel.
  - admin: Object possession verbs have been moved to Admin Fun.
  - rscadd: Winning the slot machine jackpot now gives a memory.
  - balance: Winning the slot machine jackpot is a +4 moodlet instead of +6, but it
      is now a permanent moodlet.
  - rscadd: Losing large amounts of money from the CRAB-17 will give you a negative
      moodlet, which overwrites jackpot winnings.
  - rscadd: Medbay/Detectives can now add a Cause of Death to people's medical records
      when set as deceased.
  - qol: Health assemblies now show their health in maptext rather than a stat panel
      entry.
  - qol: Holoparasites' abilities are now action buttons, so you can rebind or move
      them.
  - qol: Holoparasites now have floor change buttons.
  - bugfix: Holoparasites and Soulscythes now have a combat mode indicator.
  - bugfix: Dextrous holoparasites now have their inventory slot again while non-dextrous
      had it taken away (not that they could use it).
  - bugfix: The Combat indicator will now properly move back to its original location
      when using F12.
  - bugfix: Sleep icon now appears again & rest icon now respects "Toggle Hotkeys
      button" mode.
  JoshAdamPowell:
  - admin: admins can more freely mess with ooc colours
  LT3:
  - bugfix: Fixed loss of credits for correctly denied minerals market cargo manifest
  - bugfix: Cargo budget materials market orders arrive in crates as expected
  LemonInTheDark:
  - config: Added a config option for the path to policy.json
  Macaroni:
  - rscadd: Added the sweater vest
  - qol: Xenos can now interpret Galactic Common to enable roleplay
  - balance: The Xeno Queen now has a movement debuff of 1 instead of 2.
  Maxipat:
  - rscadd: New css style class for use in config. Now you can notice policy text
      easier
  Meblert:
  - balance: Wizard Transparence perk's curse is permanent
  Melbert:
  - bugfix: Fixes the IDC
  - refactor: A majority of machines had their screwdriver/crowbar/wrench interactions
      rewritten, report any oddities like being unable to open a machine's panel or
      deconstruct a machine
  - qol: TTS voice is more appropriately randomized to gender
  - qol: Getting randomized through means such as mulligan toxin randomizes TTS voices
  - rscadd: Some undergarmants will now use a generic replacement on lizard body shapes
      that fit more appropriately
  - refactor: Refactored how undergarmants generate their icons, report any oddities
      with that
  - rscadd: If a playerless body (DNR'd or otherwise) is raised as a zombie, ghosts
      are given the ability to take control of it
  - rscadd: If a body that never had a player control it is risen as a zombie, they
      are risen as a weaker "mindless zombie" (moves and heals slower, deals less
      damage, infection is not guaranteed on hit)
  - rscdel: Zero-gravity drifting is no longer affected by inertia, ie it has been
      reverted to what it once was.
  - bugfix: A dirty mask that CAN be pushed out of the way no longer obscures vision
      if it IS pushed out of the way.
  - qol: If your mask is dirty from pepper spray, you get some passive chat messages
      indicating that it can be cleaned off.
  - balance: Pepper spray clothing dirt is applied piecemeal - smaller dosages, rather
      than doing nothing, now build up with repeat applications.
  - balance: Pepper spray clothing dirt now has a tier between "very obscured vision"
      and "no obscured vision", giving the wearer more of a warning before being thrust
      into darkness.
  - balance: Pepper spray can no longer stack blindness infinitely - it is now capped
      to 6 seconds. This brings it in line with its other effects (confusion capped
      at 5 seconds, blur capped at 10 seconds, knockdown capped at 3 seconds).
  - qol: Roundstart xeno egg is now mentioned in the roundstart report as an addendum,
      rather than as a second report (usually) following the roundstart report.
  - admin: Admins can no longer edit global movespeed modifier datums
  - qol: Recovered crew/Thanatorenasia bodies in morgue trays change the indicator
      to green when a ghost is orbiting them (to allow ghosts to signal they want
      it to be revived)
  - qol: Recovered crew/Thanatorenasia bodies now cause morgue trays / bodybags to
      shake when orbited, much like how the body itself shakes when orbited (to allow
      ghosts to signal they want it to be revived)
  - qol: Surgical states applied by wounds don't appear in examine unless the mob
      is prepared for surgery
  - qol: Surgical state examine text is now slightly smaller
  - qol: '"Fix bones" surgery operation no longer appears if the patient is suffering
      a bone fracture - you will need to "repair fracture" instead.'
  - bugfix: Heretic "research knowledge" objective no longer undershoots the target
      value by ~8-10
  - rscadd: Spacers who manage to get nograv while on a planet are given a positive
      moodlet, and are considered in space for the purpose of their buffs/debuffs
  - bugfix: Fix cyborgs being unable to do surgeries that ask for user input before
      it begins
  - rscadd: Walking in snow or sand leaves behind prints. You can examine the turf
      to see what left the prints, like with bloodprints.
  - rscadd: Snowstorms or sandstorms clear away any footprints left behind in the
      snow or sand.
  - rscadd: Some equipment or effects, like skis or snowshoes, prevent you from leaving
      prints in the snow.
  - rscadd: You can fill in snowprints with snow.
  - balance: Upon being successfully sacrificed by a heretic all other heretics lose
      you as a target, and you can no longer be (re)rolled as a target by other heretics.
  - bugfix: Carp mask can be used for internals again
  - balance: You can no longer dismount riders from ponies with a single click. Instead,
      there is a chance to dismount the rider on shoving the pony OR the rider, based
      on multiple factors (such as stamina + physical damage and stagger)
  - balance: The Leaper mount also has this "disarm to dismount" mechanic, though
      it is significantly more difficult as they are much sturdier beasts
  - refactor: Refactored the SDSM-35 to allow for new books of similar styles, report
      any oddities with it.
  - bugfix: Fixes the broken image(s) in the SDSM-35.
  - rscadd: Adds the IDC-27 in Medbay, the CMO's office, Virology, and possibly the
      Library. It's a reference book to all viruses you may experience, similar to
      the SDSM-35.
  - rscadd: Several diseases/viruses received minor flavor adjustments, primarily
      to cure text, agent, description, and form.
  - rscadd: Getting cured of the Flu provides immunity to Spanish Flu (and visa versa)
      as implied in cure text.
  - rscadd: Getting cured of a Cold provides immunity to Cold-9 (and visa versa) as
      implied in cure text.
  - qol: '"Egg" foodtype now exists for better food sorting, though no species in
      particular likes or dislikes it at the moment.'
  - qol: Food crafting recipes now have three sub categories - Cuisine type, Dish
      type, and Meal type. You can now filter between "Moth Pizzas" or "Lizard Soups"
      rather than needing to guess if the recipe is in "Pizza" or "Mothic".
  - spellcheck: de-capitalized several foods
  - rscadd: Traitor Lawyers, Quartermasters, and Heads of Personnels can now purchase
      a "Briefcase Embedded Firearm Trigger" from the uplink for 4tc - a briefcase
      that allows any weapon stored within to be fired by "firing" the briefcase itself.
      Weapon sizes are restricted to whatever fits in a briefcase, meaning it practically
      only works with pistols and some laser weapons.  It has a subtle examine tell
      that only appears while being held.
  - rscadd: Also available for 8tc is a combo deal that comes pre-loaded with a Makarov.
      This can also appear as a medium Spy reward.
  - balance: The Spy item "boot dagger"'s examine tell now only appears if you're
      examining them WHILE holding them.
  - bugfix: Fixes wizard, cult, nukies, revs, and malf being unable to be selected
      for roundstart antag (yes, you read that right)
  - bugfix: Removing brain updates the med hud
  - balance: Holy water temporarily pauses some effects of, and helps reverse, cursed
      painting effects
  - bugfix: Fix zombie powder perma-coma on injection
  - bugfix: Reset Dislocation operation ignores clothing
  Neocloudy:
  - bugfix: DNA mob height doesn't instantly fall back to the base height for all
      mobs.
  - bugfix: '[NOVA] The report shown by the Your Last Round verb will be updated if
      you''re connected when the round ends, instead of only being updated if you
      manually viewed the roundend report. This is how it behaves on TG.'
  - bugfix: '[NOVA] There are no longer two options for ghost runechat, and an admin
      button that claims to disable it but doesn''t.'
  - bugfix: '[NOVA] Nova-specific undergarments can be colored again.'
  OrbisAnima:
  - balance: Bridge assistant no longer rolls for antags... hopefully.
  - rscdel: Removed the design for the X-Ray laser. Its still obtainable in bit running,
      deathmatch or admin interventions.
  - bugfix: Fixed an exploit with hunter slugs which caused them to do 5 times more
      damage than they should be doing
  Pumpkinoe:
  - map: Centcom's ERT wing has been updated, including a new door that leads directly
      to the pod bay and buttons to control the doors!
  Rhials:
  - bugfix: Donk Trading Post cameras no longer show up on the station cameranet
  - spellcheck: The alien dissection guide steps have been updated to reflect changes
      to surgical processes.
  - bugfix: The shuttle loan event will now properly clear itself if not accepted
      within the time limit, allowing for different loan opportunities to roll.
