2026-05-04:
  00-Steven:
  - admin: Holoparasite boobytraps now log when they're set and when they explode.
  - bugfix: Books no longer get trimmed below the paper length limit.
  - bugfix: Books made using paperwork created with multiple inputs no longer put
      all that text on the same line.
  1393F:
  - bugfix: The wooden bowl no longer turns invisible upon being filled with a reagent.
  Absolucy:
  - admin: View Variables can now properly view alists, altho it cannot edit them.
  - qol: Added an indicator to chat highlight settings if you've input an invalid
      regex (a red border around the textbox).
  - qol: You can now enable/disable individual chat highlights.
  - bugfix: Ascended Void heretics now properly play the deflect sound when deflecting
      projectiles.
  Absolucy, PowerfulBacon:
  - bugfix: Screentip icons work on the latest BYOND 516 again.
  Aliceee2ch:
  - bugfix: Fixed empty message when ejecting an ID card from PDA.
  - spellcheck: Renamed golden data disk to syndicate data disk.
  - spellcheck: Most of wrenching screentips should be properly capitalized now.
  ArcaneMusic:
  - qol: The pneumatic cannon's examine will now show the contents of the cannon loaded.
  - bugfix: You may now place a pneumatic cannon (and the clown's pie cannon!) onto
      tables.
  - admin: Adds a secret to restart the gravity generator.
  - bugfix: More safeguards were added to the admin "Create Black Market Item" verb.
  - bugfix: Weakpoints have more safeguards to prevent them from spawning onto space.
  - image: Weakpoints now have an animation to spawn in with.
  - spellcheck: corrected some instances within TGC cards to say "plasma" instead
      of "mana" when referring to card costs.
  - rscadd: The Civilian bounty pad now has a new tab, where players can collaborate
      and work together to complete additional, station wide bounties. Reward is split
      based on the amount contributed. (Between 5-10 based on population to start)
  - rscadd: The civilian bounty pad can now print out sheets of paper displaying all
      available bounties, like old times.
  - bugfix: The ninja holding facility is no longer loaded when civilian bounties
      are sent.
  Arturlang:
  - bugfix: rust heretic robes now become buffed if the tile under you becomes rusted
  - balance: void ascension and the void chill status effect now respect antimagic
  - rscadd: heretic aura is now emissive.
  - bugfix: a exploit where you could exit space phase anywhere by loosing your heretic
      focus
  - bugfix: moon ascension aura not affecting anyone else if one of the targets has
      more than 10 sanity
  Ben10Omintrix:
  - bugfix: fixes bot huds randomly dissappearing
  - balance: the grapple gun's price has been reduced to 1500 points
  Diltyrr:
  - bugfix: Stone griddles do not have a chance to spawn invisible anymore.
  Dolphyuser:
  - balance: Now you can't handcuff shields
  ElGitificador:
  - bugfix: Deleted the misleading key request for the dragon lavaboat
  - spellcheck: due to conflicts with the hive empress, lamarr has lost it s diplomatic
      facehugger title
  FalloutFalcon:
  - bugfix: The swap hand tutorial wont be shown to someone missing a hand
  - bugfix: A handful of permissions panel querys now work again
  Happyowl93:
  - bugfix: chameleon items work again
  - qol: increase AI request cd to 5 mins, cd per door/player
  Hardly:
  - bugfix: Fixes custom tongue not working on characters that have joined at the
      start of the round
  - bugfix: Kitsune mask no longer keeps the user's identity hidden while it's flipped
  Hatterhat:
  - rscadd: Spaceship plates and spaceship glass can now be smelted from the ore redemption
      machine or made at cargo/engi/science fabricators.
  - rscadd: Pod windows are now buildable with spaceship glass. Pod windows have been
      rebalanced to account for them being titanium glass.
  - balance: Upgraded hydroponics trays now have reduced power draw with improved
      parts, in the wake of complaints from both engineering and botanical staff regarding
      exponentially increased short circuit frequency (and associated energy waste)
      in affected tray basins.
  - rscadd: Nanotrasen Central Command Research and Development has begun field-testing
      of hybrid alloy tools. Bother your local Research department (after they have
      alien tech) to grab a piece of assimilative superalloy and combine it with the
      relevant tools to experience the far future's cutting edge of tool technology.
